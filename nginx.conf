limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

server {
    listen 80;
    server_name forum-production-3dd7.up.railway.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name forum-production-3dd7.up.railway.app;

    ssl_certificate /etc/letsencrypt/live/forum-production-3dd7.up.railway.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum-production-3dd7.up.railway.app/privkey.pem;

    location /threads {
        limit_req zone=threads_limit;
        limit_req_status 429;

        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
